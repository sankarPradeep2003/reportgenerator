services:
  - type: web
    name: reportgenerator
    env: python
    buildCommand: pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium
    startCommand: gunicorn app:app
    envVars:
      - key: PLAYWRIGHT_HEADLESS
        value: true
      - key: RENDER
        value: true
      - key: FLASK_SECRET
        generateValue: true

